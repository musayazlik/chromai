<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chromai · AI Renk Paleti Üreticisi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap');

  :root{
    --bg:       #e7eaf1;
    --surface:  #eef1f7;
    --nm-dark:  #c5c9d4;
    --nm-light: rgba(255,255,255,.5);
    --text:     #2c303b;
    --text-dim: #6b7180;
    --text-mute:#9aa0b0;
    --line:     rgba(20,30,60,.09);
    --glass:      rgba(255,255,255,.5);
    --glass-line: rgba(255,255,255,.75);
    --grad: linear-gradient(135deg,#6366f1,#8b5cf6 55%,#ec4899);
  }
  *{box-sizing:border-box;margin:0;padding:0}

  body{
    min-height:100vh;
    font-family:'Inter',system-ui,sans-serif; color:var(--text);
    background:
      radial-gradient(900px 600px at 10% -8%, rgba(59,130,246,.12), transparent 60%),
      radial-gradient(820px 620px at 105% 8%, rgba(236,72,153,.10), transparent 55%),
      radial-gradient(700px 600px at 50% 120%, rgba(45,212,191,.10), transparent 55%),
      var(--bg);
    -webkit-font-smoothing:antialiased;
  }
  .page{max-width:1040px; margin:0 auto; padding:62px 24px 96px}

  /* ——————————————————— HERO ——————————————————— */
  .hero{text-align:center; max-width:700px; margin:0 auto}
  .brand{display:inline-flex; align-items:center; gap:8px; font:600 14px/1 'Space Grotesk',sans-serif; letter-spacing:.02em; color:var(--text-dim)}
  .brand .mark{width:15px; height:15px; border-radius:5px; background:var(--grad); box-shadow:0 2px 7px rgba(139,92,246,.45)}
  .headline{font-family:'Space Grotesk',sans-serif; font-size:clamp(31px,5.4vw,47px); font-weight:700; line-height:1.06; letter-spacing:-.025em; margin-top:22px}
  .headline .grad{background:linear-gradient(110deg,#3b82f6,#8b5cf6 50%,#ec4899); -webkit-background-clip:text; background-clip:text; color:transparent}
  .lede{margin:16px auto 0; max-width:548px; font-size:16px; line-height:1.6; color:var(--text-dim)}

  /* ——————————————————— COMPOSER (modern) ——————————————————— */
  .composer-wrap{max-width:640px; margin:36px auto 0}
  .composer{
    background:#fff; border:1px solid var(--line); border-radius:22px;
    box-shadow:0 1px 2px rgba(20,30,60,.04), 0 12px 34px rgba(40,55,90,.09);
    padding:16px 16px 12px;
    transition:border-color .18s ease, box-shadow .18s ease;
  }
  .composer:focus-within{
    border-color:rgba(124,58,237,.4);
    box-shadow:0 1px 2px rgba(20,30,60,.04), 0 14px 40px rgba(124,58,237,.15), 0 0 0 4px rgba(124,58,237,.1);
  }
  .composer-input{
    width:100%; border:0; outline:none; background:transparent; resize:none; display:block;
    font:500 16px/1.55 'Inter',sans-serif; color:var(--text);
    min-height:30px; max-height:140px; padding:3px 4px 0; overflow-y:auto;
  }
  .composer-input::placeholder{color:var(--text-mute)}
  .composer-bar{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:13px}

  /* model seçici */
  .model-select{position:relative}
  .model-btn{
    display:flex; align-items:center; gap:8px; cursor:pointer;
    background:#f3f4f8; border:1px solid var(--line); border-radius:12px;
    padding:7px 10px 7px 8px; font:500 13px/1 'Inter',sans-serif; color:var(--text);
    transition:background .15s ease, border-color .15s ease;
  }
  .model-btn:hover{background:#eceef4}
  .m-logo{width:22px; height:22px; border-radius:7px; flex:0 0 auto; box-shadow:inset 0 1px 0 rgba(255,255,255,.4)}
  .model-btn .chev{color:var(--text-mute); transition:transform .18s ease; margin-left:1px}
  .model-select.open .chev{transform:rotate(180deg)}
  .model-menu{
    position:absolute; bottom:calc(100% + 8px); left:0; z-index:30; width:248px;
    background:#fff; border:1px solid rgba(20,30,60,.1); border-radius:15px;
    box-shadow:0 16px 44px rgba(30,40,70,.18); padding:6px;
    opacity:0; transform:translateY(6px) scale(.98); pointer-events:none;
    transition:opacity .16s ease, transform .16s ease;
  }
  .model-select.open .model-menu{opacity:1; transform:none; pointer-events:auto}
  .m-head{font-size:10.5px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--text-mute); padding:8px 10px 5px}
  .m-item{display:flex; align-items:center; gap:10px; width:100%; cursor:pointer; text-align:left; border:0; background:transparent; border-radius:11px; padding:9px 10px; font-family:inherit; color:var(--text)}
  .m-item:hover{background:#f3f4f8}
  .m-meta{display:flex; flex-direction:column; gap:2px; line-height:1}
  .m-name{font-size:13.5px; font-weight:600}
  .m-desc{font-size:11.5px; color:var(--text-mute)}
  .m-item .check{margin-left:auto; color:#7c3aed; opacity:0; flex:0 0 auto}
  .m-item.sel .check{opacity:1}

  .gen-btn{
    flex:0 0 auto; display:flex; align-items:center; gap:7px; border:0; cursor:pointer;
    padding:11px 19px; border-radius:13px; font:600 14px/1 'Inter',sans-serif; color:#fff;
    background:var(--grad); box-shadow:0 6px 16px rgba(124,58,237,.32);
    transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
  }
  .gen-btn:hover{transform:translateY(-1px); box-shadow:0 9px 22px rgba(124,58,237,.4)}
  .gen-btn:active{transform:translateY(0)}
  .gen-btn:disabled{opacity:.65; cursor:default; transform:none}
  .composer.shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

  /* ——————————————————— RESULTS ——————————————————— */
  .results{margin-top:54px}
  .results-head{display:flex; align-items:baseline; gap:12px; margin-bottom:22px}
  .results-head h2{font:600 16px/1 'Space Grotesk',sans-serif; letter-spacing:-.01em}
  .results-head .sub{font-size:13px; color:var(--text-mute)}

  /* ortadaki oluşturma animasyonu */
  .loader{display:none; flex-direction:column; align-items:center; gap:16px; padding:46px 0 50px; text-align:center}
  .loader.on{display:flex; animation:rise .4s ease}
  .orb{position:relative; width:74px; height:74px}
  .orb i{
    position:absolute; inset:0; border-radius:50%;
    background:conic-gradient(from 0deg,#6366f1,#8b5cf6,#ec4899,#fb923c,#2dd4bf,#6366f1);
    -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 9px), #000 calc(100% - 8px));
            mask:radial-gradient(farthest-side, transparent calc(100% - 9px), #000 calc(100% - 8px));
    animation:spin 1.05s linear infinite;
  }
  .orb::after{content:""; position:absolute; inset:-16px; border-radius:50%; z-index:-1;
    background:radial-gradient(closest-side, rgba(139,92,246,.32), transparent 70%); filter:blur(6px);
    animation:pulse 1.5s ease-in-out infinite}
  .loader-txt{font-size:14px; font-weight:500; color:var(--text-dim); display:flex; align-items:center; gap:1px}
  .loader-txt b{color:var(--text); font-weight:600}
  .dots{display:inline-flex; gap:4px; margin-left:6px}
  .dots i{width:5px; height:5px; border-radius:50%; background:var(--text-mute); animation:blink 1.2s infinite}
  .dots i:nth-child(2){animation-delay:.2s} .dots i:nth-child(3){animation-delay:.4s}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:.5; transform:scale(.92)}50%{opacity:1; transform:scale(1.12)}}
  @keyframes blink{0%,100%{opacity:.25; transform:translateY(0)}50%{opacity:1; transform:translateY(-3px)}}

  .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(290px,1fr)); gap:28px}

  /* ——————————————————— KART ——————————————————— */
  .card{
    position:relative; border-radius:26px; padding:22px 20px 20px; background:var(--surface);
    box-shadow:11px 11px 26px var(--nm-dark), -11px -11px 24px var(--nm-light);
    overflow:hidden; opacity:1; animation:rise .6s cubic-bezier(.2,.75,.2,1) backwards;
    transition:transform .35s cubic-bezier(.2,.75,.2,1), box-shadow .35s ease;
  }
  .card:hover{transform:translateY(-8px); box-shadow:16px 18px 34px var(--nm-dark), -12px -12px 26px var(--nm-light)}
  .card::after{content:""; position:absolute; left:-15%; right:-15%; bottom:-28%; height:50%;
    background:
      radial-gradient(closest-side, color-mix(in srgb, var(--a) 45%, transparent), transparent 70%) 20% 50%/60% 100% no-repeat,
      radial-gradient(closest-side, color-mix(in srgb, var(--b) 45%, transparent), transparent 70%) 80% 50%/60% 100% no-repeat;
    filter:blur(22px); pointer-events:none; z-index:0}
  .card > *{position:relative; z-index:1}
  @keyframes rise{from{opacity:0; transform:translateY(26px)} to{opacity:1; transform:translateY(0)}}

  .eyebrow{display:flex; align-items:center; gap:8px; font-size:10.5px; font-weight:600; letter-spacing:.16em; color:var(--text-mute); text-transform:uppercase}
  .eyebrow .dotline{flex:1; height:1px; background:linear-gradient(90deg,var(--nm-dark),transparent)}
  .title{font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:700; letter-spacing:-.02em; margin-top:7px; line-height:1}
  .subtitle{margin-top:5px; font-size:12px; color:var(--text-dim)}

  .grad-box{position:relative; height:104px; margin-top:16px; border-radius:16px;
    background:linear-gradient(135deg, var(--a) 0%, var(--b) 100%);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.45), inset 0 1px 2px rgba(255,255,255,.6), 0 8px 18px color-mix(in srgb, var(--b) 35%, transparent)}
  .chip{position:absolute; top:11px; left:11px; padding:5px 9px; border-radius:999px; font:600 10.5px/1 'JetBrains Mono',monospace; color:#fff;
    background:rgba(255,255,255,.22); -webkit-backdrop-filter:blur(7px) saturate(150%); backdrop-filter:blur(7px) saturate(150%);
    border:1px solid rgba(255,255,255,.4); box-shadow:inset 0 1px 0 rgba(255,255,255,.5)}
  .copy-css{position:absolute; bottom:11px; right:11px; display:flex; align-items:center; gap:5px; padding:6px 11px; border:0; cursor:pointer; border-radius:999px;
    font:600 11px/1 'Inter',sans-serif; color:#2c303b; background:rgba(255,255,255,.88); box-shadow:0 3px 10px rgba(0,0,0,.18); transition:transform .15s ease, background .15s ease}
  .copy-css:hover{transform:translateY(-1px); background:#fff}

  .swatches{margin-top:16px; display:flex; flex-direction:column; gap:2px}
  .swatch{display:flex; align-items:center; gap:12px; width:100%; padding:10px 6px; border:0; cursor:pointer; text-align:left; background:transparent; border-radius:11px; color:var(--text); font-family:inherit; transition:background .18s ease, transform .12s ease}
  .swatch + .swatch{box-shadow:inset 0 1px 0 rgba(0,0,0,.04)}
  .swatch:hover{background:rgba(255,255,255,.55); transform:translateX(2px)}
  .swatch:focus-visible{outline:2px solid var(--a); outline-offset:2px}
  .dot{width:28px; height:28px; flex:0 0 auto; border-radius:8px; box-shadow:inset 0 1px 2px rgba(255,255,255,.7), inset 0 0 0 1px rgba(0,0,0,.06), 0 3px 7px rgba(0,0,0,.18)}
  .meta{flex:1; min-width:0}
  .name{font-size:13.5px; font-weight:600; line-height:1.2}
  .role{font-size:11px; color:var(--text-mute); margin-top:1px}
  .hex{font:600 12.5px/1 'JetBrains Mono',monospace; color:var(--text-dim); display:flex; align-items:center; gap:6px}
  .hex .ic{opacity:.4; transition:opacity .15s ease}
  .swatch:hover .hex .ic{opacity:.85}
  .swatch.copied .hex{color:var(--a)}

  .ai{margin-top:16px; padding:14px 14px 13px; border-radius:16px; background:var(--glass);
    -webkit-backdrop-filter:blur(16px) saturate(140%); backdrop-filter:blur(16px) saturate(140%);
    border:1px solid var(--glass-line); box-shadow:inset 0 1px 0 rgba(255,255,255,.8), 0 5px 16px rgba(0,0,0,.07)}
  .ai-head{display:flex; align-items:center; gap:8px; margin-bottom:8px}
  .ai-badge2{display:grid; place-items:center; width:22px; height:22px; border-radius:7px; background:linear-gradient(135deg, var(--a), var(--b)); box-shadow:0 3px 9px color-mix(in srgb, var(--b) 40%, transparent), inset 0 1px 0 rgba(255,255,255,.5)}
  .ai-title{font-size:12.5px; font-weight:600}
  .ai-title span{color:var(--text-mute); font-weight:500}
  .ai-body{font-size:12px; line-height:1.55; color:#454b58}
  .tags{display:flex; flex-wrap:wrap; gap:6px; margin-top:11px}
  .tag{font-size:10.5px; font-weight:600; padding:4px 9px; border-radius:999px; color:#3a3f4b; background:rgba(255,255,255,.6); border:1px solid rgba(0,0,0,.06)}

  .toast{position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(16px); background:rgba(44,48,59,.92); color:#fff; font-size:13px; font-weight:500; padding:10px 18px; border-radius:999px; box-shadow:0 10px 28px rgba(0,0,0,.25); opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease; z-index:60}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  @media (max-width:520px){
    .composer-bar{flex-wrap:wrap}
    .gen-btn{flex:1 1 100%; justify-content:center}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
</style>
</head>
<body>
  <div class="page">

    <header class="hero">
      <div class="brand"><span class="mark"></span> Chrom<span style="background:linear-gradient(110deg,#6366f1,#8b5cf6,#ec4899);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:700">ai</span></div>
      <h1 class="headline">Renk paletini <span class="grad">yapay zekâ</span> üretsin</h1>
      <p class="lede">İstediğin atmosferi birkaç kelimeyle yaz — uyumlu ikili renk paletini anında oluştur, hex'leri tek tıkla kopyala.</p>
    </header>

    <div class="composer-wrap">
      <div class="composer" id="composer">
        <textarea class="composer-input" id="prompt" rows="1" placeholder="Nasıl bir atmosfer istersin? ör. sakin bir fintech panosu, gün batımında sahil kafesi…"></textarea>
        <div class="composer-bar">
          <div class="model-select" id="modelSelect">
            <button class="model-btn" id="modelBtn" type="button">
              <span class="m-logo" id="curLogo"></span>
              <span id="curName">Claude Sonnet 4.6</span>
              <svg class="chev" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <div class="model-menu" id="modelMenu">
              <div class="m-head">Yapay zekâ modeli</div>
            </div>
          </div>
          <button class="gen-btn" id="gen" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M12 2l1.8 5.4L19 9l-5.2 1.6L12 16l-1.8-5.4L5 9l5.2-1.6L12 2z"/></svg>
            <span class="lbl">Oluştur</span>
          </button>
        </div>
      </div>
    </div>

    <section class="results">
      <div class="results-head">
        <h2 id="rtitle">Paletler</h2>
        <span class="sub" id="rsub">Başlamak için bir his tarif et</span>
      </div>
      <div class="loader" id="loader">
        <div class="orb"><i></i></div>
        <div class="loader-txt"><b id="lmodel">Claude Sonnet 4.6</b>&nbsp;ile paletler oluşturuluyor<span class="dots"><i></i><i></i><i></i></span></div>
      </div>
      <div class="grid" id="grid"></div>
    </section>
  </div>

  <div class="toast" id="toast">Kopyalandı</div>

  <script>
    const $ = s => document.querySelector(s);
    const grid=$('#grid'), loader=$('#loader'), btn=$('#gen'), input=$('#prompt'), composer=$('#composer'), toast=$('#toast');
    let tt;
    const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const hex = h => { h=String(h||'').trim(); return /^#?[0-9a-fA-F]{6}$/.test(h) ? ('#'+h.replace('#','')).toUpperCase() : '#888888'; };
    const wait = ms => new Promise(r=>setTimeout(r,ms));
    function flash(m){ toast.textContent=m; toast.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>toast.classList.remove('show'),1400); }
    async function copy(t,m){ try{ await navigator.clipboard.writeText(t);}catch(e){} flash(m); }

    /* —— modeller —— */
    const MODELS = [
      {id:'claude-sonnet-4-6', name:'Claude Sonnet 4.6', desc:'Dengeli ve hızlı', g:'linear-gradient(135deg,#6366f1,#8b5cf6)', claude:true},
      {id:'claude-opus-4-8',  name:'Claude Opus 4.8',  desc:'En güçlü',       g:'linear-gradient(135deg,#8b5cf6,#ec4899)', claude:true},
      {id:'claude-haiku-4-5', name:'Claude Haiku 4.5', desc:'En hızlı',       g:'linear-gradient(135deg,#2dd4bf,#3b82f6)', claude:true},
      {id:'gpt',    name:'GPT',    desc:'OpenAI', g:'linear-gradient(135deg,#10a37f,#0d8a6b)', claude:false},
      {id:'gemini', name:'Gemini', desc:'Google', g:'linear-gradient(135deg,#4285f4,#9b72cb)', claude:false},
    ];
    let current = MODELS[0];
    const sel=$('#modelSelect'), menu=$('#modelMenu'), curName=$('#curName'), curLogo=$('#curLogo');
    const check = '<svg class="check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
    MODELS.forEach(m=>{
      const b=document.createElement('button'); b.type='button'; b.className='m-item'+(m.id===current.id?' sel':''); b.dataset.id=m.id;
      b.innerHTML = `<span class="m-logo" style="background:${m.g}"></span>
        <span class="m-meta"><span class="m-name">${m.name}</span><span class="m-desc">${m.desc}</span></span>${check}`;
      menu.appendChild(b);
    });
    function setModel(m){ current=m; curName.textContent=m.name; curLogo.style.background=m.g; $('#lmodel').textContent=m.name;
      menu.querySelectorAll('.m-item').forEach(i=>i.classList.toggle('sel', i.dataset.id===m.id)); }
    setModel(current);
    $('#modelBtn').addEventListener('click', e=>{ e.stopPropagation(); sel.classList.toggle('open'); });
    menu.addEventListener('click', e=>{ const it=e.target.closest('.m-item'); if(!it) return; setModel(MODELS.find(x=>x.id===it.dataset.id)); sel.classList.remove('open'); });
    document.addEventListener('click', ()=> sel.classList.remove('open'));

    /* —— kart —— */
    function swatchHTML(c){ const h=hex(c.hex); return `<button class="swatch" type="button" data-hex="${h}">
      <span class="dot" style="background:${h}"></span>
      <span class="meta"><span class="name">${esc(c.name)}</span><span class="role">${esc(c.role||'')}</span></span>
      <span class="hex">${h} <span class="ic">⧉</span></span></button>`; }
    function cardNode(p){
      const a=hex(p.colors[0].hex), b=hex(p.colors[1].hex);
      const el=document.createElement('article'); el.className='card';
      el.style.setProperty('--a',a); el.style.setProperty('--b',b);
      el.innerHTML=`<div class="eyebrow"><span>Renk Paleti</span><span class="dotline"></span><span>2 renk</span></div>
        <h3 class="title">${esc(p.name)}</h3><p class="subtitle">${esc(p.subtitle)}</p>
        <div class="grad-box"><div class="chip">135°</div>
          <button class="copy-css" type="button" data-css="linear-gradient(135deg, ${a} 0%, ${b} 100%)">CSS</button></div>
        <div class="swatches">${swatchHTML(p.colors[0])}${swatchHTML(p.colors[1])}</div>
        <section class="ai"><div class="ai-head">
          <span class="ai-badge2"><svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><path d="M12 2l1.8 5.4L19 9l-5.2 1.6L12 16l-1.8-5.4L5 9l5.2-1.6L12 2z"/></svg></span>
          <span class="ai-title">AI Yorumu <span>· analiz</span></span></div>
          <p class="ai-body">${esc(p.comment)}</p>
          <div class="tags">${(p.tags||[]).slice(0,3).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></section>`;
      return el;
    }
    function mount(list, prepend=false){ list.forEach((p,i)=>{ const el=cardNode(p); el.style.animationDelay=(i*0.1)+'s';
      if(prepend) grid.insertBefore(el, grid.firstChild); else grid.appendChild(el); }); }

    /* —— üretim —— */
    async function generateViaAI(q){
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000,
          system:"Sadece geçerli ham JSON döndürürsün. Markdown, kod bloğu veya açıklama yazmazsın.",
          messages:[{role:"user", content:
`Kullanıcının tarif ettiği atmosfer: "${q}".
Bu atmosfere uygun 3 farklı renk paleti üret. Her palet TAM OLARAK 2 uyumlu (analog ya da hoş duran) renk içersin; çok yüksek kontrast olmasın.
Yanıtı yalnızca şu JSON dizisi formatında ver:
[{"name":"kısa Türkçe palet adı","subtitle":"kısa Türkçe tanım (3-4 kelime)","colors":[{"name":"renk adı","hex":"#RRGGBB","role":"Ana renk"},{"name":"renk adı","hex":"#RRGGBB","role":"Vurgu"}],"comment":"1-2 cümlelik Türkçe ruh hali ve kullanım yorumu","tags":["etiket","etiket","etiket"]}]
Tüm metinler Türkçe olsun. Sadece JSON döndür.`}] })
      });
      if(!res.ok) throw new Error("api");
      const data = await res.json();
      const text = data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
      const arr = JSON.parse(text.replace(/```json|```/g,'').trim());
      const ok = arr.filter(p=>p&&p.colors&&p.colors.length>=2).slice(0,3);
      if(!ok.length) throw new Error("shape");
      return ok;
    }
    const LIB=[
      {name:'Lagün',subtitle:'Serin analog ikili',colors:[{name:'Turkuaz',hex:'#2DD4BF',role:'Ana renk'},{name:'Gök Mavisi',hex:'#3B82F6',role:'Vurgu'}],comment:'Serin ve komşu bir geçiş; fintech, sağlık ve kurumsal panolar için güvenli bir seçim.',tags:['Sakin','Güvenilir','Kurumsal']},
      {name:'Orkide',subtitle:'Yaratıcı mor–pembe',colors:[{name:'Mor',hex:'#7C3AED',role:'Ana renk'},{name:'Fuşya',hex:'#EC4899',role:'Vurgu'}],comment:'Komşu mor–pembe geçişi: yaratıcı ve premium bir his. Lansman ve kişisel marka için ideal.',tags:['Yaratıcı','Premium','Cesur']},
      {name:'Şafak',subtitle:'Sıcak turuncu–gül',colors:[{name:'Turuncu',hex:'#FB923C',role:'Ana renk'},{name:'Gül',hex:'#F43F5E',role:'Vurgu / CTA'}],comment:'Sıcak ve davetkâr ikili; yemek, yaşam tarzı ve kampanya CTA\'larında iştah açar.',tags:['Enerjik','Sıcak','Davetkâr']},
      {name:'Orman',subtitle:'Doğal yeşil–zeytin',colors:[{name:'Yeşil',hex:'#16A34A',role:'Ana renk'},{name:'Zeytin',hex:'#65A30D',role:'Vurgu'}],comment:'Doğal ve dengeli; sürdürülebilirlik ve outdoor markaları için taze bir zemin.',tags:['Doğal','Taze','Dengeli']},
      {name:'Lavanta',subtitle:'Yumuşak mor–indigo',colors:[{name:'Lavanta',hex:'#A78BFA',role:'Ana renk'},{name:'İndigo',hex:'#818CF8',role:'Vurgu'}],comment:'Hafif ve hayalperest; wellness, AI ve pastel arayüzlerde zarif durur.',tags:['Yumuşak','Modern','Sakin']},
      {name:'Okyanus',subtitle:'Ferah camgöbeği–mavi',colors:[{name:'Camgöbeği',hex:'#0EA5E9',role:'Ana renk'},{name:'Mavi',hex:'#2563EB',role:'Vurgu'}],comment:'Ferah ve net; teknoloji, seyahat ve SaaS hero alanlarında güvenle parlar.',tags:['Ferah','Net','Teknolojik']},
      {name:'Toprak',subtitle:'Sıcak kahve–amber',colors:[{name:'Kahve',hex:'#B45309',role:'Ana renk'},{name:'Amber',hex:'#D97706',role:'Vurgu'}],comment:'Organik ve sıcak; kahve, el yapımı ve butik markalara samimi bir karakter verir.',tags:['Organik','Sıcak','Samimi']},
      {name:'Gece Moru',subtitle:'Derin mor–indigo',colors:[{name:'Mor',hex:'#6D28D9',role:'Ana renk'},{name:'İndigo',hex:'#4F46E5',role:'Vurgu'}],comment:'Gizemli ve premium; gece modu, müzik ve lüks ürün sayfaları için güçlü.',tags:['Premium','Gizemli','Modern']},
    ];
    const fallback = () => [...LIB].sort(()=>Math.random()-.5).slice(0,3).map(p=>({...p}));

    let busy=false;
    async function run(){
      if(busy) return;
      const q = input.value.trim();
      if(!q){ composer.classList.remove('shake'); void composer.offsetWidth; composer.classList.add('shake'); input.focus(); return; }
      busy=true; btn.disabled=true; btn.querySelector('.lbl').textContent='Oluşturuluyor';
      loader.classList.add('on');
      $('#rtitle').textContent = `"${q}" için paletler`;
      $('#rsub').textContent = `${current.name} çalışıyor`;

      let palettes;
      try{
        if(!current.claude) throw new Error('non-claude');         // demo: yalnız Claude canlı; diğerleri yerelden
        [palettes] = await Promise.all([ generateViaAI(q), wait(1000) ]);
      }catch(e){ await wait(900); palettes = fallback(); }

      loader.classList.remove('on');
      mount(palettes, true);
      $('#rsub').textContent = `${palettes.length} yeni palet eklendi`;
      btn.disabled=false; btn.querySelector('.lbl').textContent='Oluştur'; busy=false;
    }

    btn.addEventListener('click', run);
    input.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); run(); } });
    input.addEventListener('input', ()=>{ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,140)+'px'; });

    grid.addEventListener('click', e=>{
      const sw=e.target.closest('.swatch');
      if(sw){ const h=sw.dataset.hex; copy(h, h+' kopyalandı'); sw.classList.add('copied'); setTimeout(()=>sw.classList.remove('copied'),900); return; }
      const cc=e.target.closest('.copy-css');
      if(cc){ copy('background: '+cc.dataset.css+';', 'Gradient CSS kopyalandı'); }
    });

    mount(LIB.slice(0,3));
    grid.querySelectorAll('.card').forEach((el,i)=> el.style.animationDelay=(i*0.09)+'s');
  </script>
</body>
</html>
